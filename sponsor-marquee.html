    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: transparent;
      overflow: hidden;
    }

    .marquee-section {
      width: 100%;
      padding: 28px 0;
    }

    .marquee-label {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
      color: #FCB237;
      margin-bottom: 15px;
    }

    .marquee-label-bar {
      width: 60px;
      height: 3px;
      background: #FCB237;
      margin: 0 auto 20px auto;
    }

    .marquee-track {
      position: relative;
      overflow: hidden;
      width: 100%;
    }

    .marquee-track::before,
    .marquee-track::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      width: 80px;
      z-index: 2;
      pointer-events: none;
    }
    .marquee-track::before {
      left: 0;
      background: linear-gradient(to right, #ffffff, transparent);
    }
    .marquee-track::after {
      right: 0;
      background: linear-gradient(to left, #ffffff, transparent);
    }

    .marquee-inner {
      display: flex;
      align-items: center;
      width: max-content;
      animation: scroll 28s linear infinite;
    }

    .marquee-inner:hover {
      animation-play-state: paused;
    }

    @keyframes scroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .logo-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 28px;
      height: 90px;
      flex-shrink: 0;
    }

    .logo-cell img {
      height: 38px;
      width: auto;
      display: block;
      object-fit: contain;
      filter: grayscale(100%);
      opacity: 0.55;
      transition: filter .25s ease, opacity .25s ease, transform .25s ease;
    }

    .logo-cell:hover img {
      filter: grayscale(0%);
      opacity: 1;
      transform: scale(1.1);
    }

    .sep {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #FCB237;
      flex-shrink: 0;
      opacity: 0.4;
    }
  </style>
</head>
