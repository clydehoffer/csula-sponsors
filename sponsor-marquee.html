<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Car Show — Sponsors</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: transparent;
      overflow-x: hidden; overflow-y: visible;
    }

    .marquee-section {
      width: 100%;
      padding: 28px 0;
    }

    .marquee-label {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase; text-align: center;
      color: #FCB237;
      margin-bottom: 5px;
    }

    .marquee-label-bar {
      width: 60px;
      height: 3px;
      background: #FCB237; margin: 0 auto;
      margin-bottom: 20px;
    }

    /* Track — hides overflow and fades edges */
    .marquee-track {
      position: relative;
      overflow-x: hidden; overflow-y: visible;
      width: 100%;
    }

    /* Fade masks on left and right edges */
    .marquee-track::before,
    .marquee-track::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      width: 80px;
      z-index: 2;
      pointer-events: none;
    }
    .marquee-track::before {
      left: 0;
      background: linear-gradient(to right, #ffffff, transparent);
    }
    .marquee-track::after {
      right: 0;
      background: linear-gradient(to left, #ffffff, transparent);
    }

    /* The scrolling inner strip — duplicated for seamless loop */
    .marquee-inner {
      display: flex;
      align-items: center;
      width: max-content;
      animation: scroll 28s linear infinite;
    }

    .marquee-inner:hover {
      animation-play-state: paused;
    }

    @keyframes scroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* Each logo cell */
    .logo-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 32px;
      height: 100px;
      flex-shrink: 0;
    }

    .logo-cell img {
      height: 40px;
      width: auto;
      display: block;
      object-fit: contain;
      filter: grayscale(100%);
      opacity: 0.55;
      transition: transform .3s ease, filter .3s ease, opacity .3s ease;
    }

    .logo-cell img:hover {
      filter: grayscale(0%);
      opacity: 1;
      transform: scale(1.65);
    }

    /* Separator dot between logos */
    .sep {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #FCB237; margin: 0 auto;
      flex-shrink: 0;
      opacity: 0.5;
    }
  </style>
</head>
